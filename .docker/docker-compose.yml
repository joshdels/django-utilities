services:
  web:
    build:
      context: ../
      dockerfile: .docker/Dockerfile
    container_name: django-utilities
    env_file:
      - .env.prod
    ports:
      - "8003:8000"
    restart: unless-stopped
    networks:
      - gis_centralize_db

networks:
  gis_centralize_db:
    external: true